name: Release CLI

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: node20-linux-x64
            extension: ''
          - runner: macos-15-intel
            target: node20-macos-x64
            extension: ''
          - runner: macos-15
            target: node20-macos-arm64
            extension: ''
          - runner: windows-latest
            target: node20-win-x64
            extension: '.exe'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate release tag
        shell: bash
        run: |
          VERSION="$(node -p "require('./packages/cli/package.json').version")"
          test "${GITHUB_REF_NAME}" = "v${VERSION}" || {
            echo "Tag ${GITHUB_REF_NAME} does not match CLI version v${VERSION}" >&2
            exit 1
          }
      - run: pnpm format && pnpm lint && pnpm typecheck && pnpm test && pnpm build
      - name: Build standalone binary
        shell: bash
        run: |
          mkdir -p release-binary
          pnpm dlx '@yao-pkg/pkg@~6.19.0' packages/cli/dist/kyokao.cjs \
            --targets '${{ matrix.target }}' \
            --output 'release-binary/kyokao${{ matrix.extension }}' \
            --compress Brotli
      - name: Smoke test binary
        shell: bash
        run: ./release-binary/kyokao${{ matrix.extension }} --version
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: release-binary/*
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: release-binaries
      - name: Create release archives and checksums
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p release-assets
          for directory in release-binaries/binary-node20-*; do
            target="${directory##*/binary-node20-}"
            archive="${GITHUB_WORKSPACE}/release-assets/kyokao-${VERSION#v}-${target}.zip"
            (cd "${directory}" && zip -q "${archive}" ./*)
          done
          (cd release-assets && sha256sum *.zip > SHA256SUMS.txt)
      - name: Verify release assets
        working-directory: release-assets
        run: sha256sum --check SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          name: Kyokao ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/*.zip
            release-assets/SHA256SUMS.txt
